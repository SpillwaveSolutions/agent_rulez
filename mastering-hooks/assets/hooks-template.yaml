# RuleZ Configuration Template
# Location: .claude/hooks.yaml
#
# This template provides a starting point for RuleZ configuration.
# Uncomment and customize rules as needed.
# Works with Claude Code, Gemini CLI, GitHub Copilot, and OpenCode.

version: "1.0"

rules:
  # ============================================================
  # SESSION HOOKS
  # ============================================================

  # Load project context at session start
  # - name: project-context
  #   description: Load project overview and conventions
  #   matchers:
  #     operations: [SessionStart]
  #   actions:
  #     inject: .claude/context/project-overview.md

  # ============================================================
  # CODE QUALITY HOOKS
  # ============================================================

  # Inject Python coding standards
  - name: python-standards
    description: Inject Python coding standards for .py files
    matchers:
      operations: [PreToolUse]
      tools: [Write, Edit]
      extensions: [.py]
    actions:
      inject: .claude/context/python-standards.md

  # Inject TypeScript/JavaScript standards
  # - name: typescript-standards
  #   description: Inject TypeScript standards
  #   matchers:
  #     operations: [PreToolUse]
  #     tools: [Write, Edit]
  #     extensions: [.ts, .tsx, .js, .jsx]
  #   actions:
  #     inject: .claude/context/typescript-standards.md

  # ============================================================
  # SECURITY HOOKS
  # ============================================================

  # Block force push to main/master
  - name: block-force-push
    description: Prevent force push to protected branches
    priority: 10
    matchers:
      operations: [PreToolUse]
      tools: [Bash]
      command_match: "git push.*(--force|-f).*(main|master)"
    actions:
      block: true
    governance:
      reason: "Force push to main/master is prohibited. Use a PR workflow."

  # Warn about recursive delete
  # - name: warn-rm-rf
  #   description: Warn before recursive delete operations
  #   priority: 20
  #   matchers:
  #     operations: [PreToolUse]
  #     tools: [Bash]
  #     command_match: "rm\\s+(-rf|-fr)"
  #   actions:
  #     inject_inline: |
  #       **Warning**: Recursive delete detected. Verify target path carefully.

  # ============================================================
  # VALIDATION HOOKS
  # ============================================================

  # Run secret scanner before commits
  # - name: pre-commit-secrets
  #   description: Check for secrets before git commit
  #   matchers:
  #     operations: [PreToolUse]
  #     tools: [Bash]
  #     command_match: "git commit"
  #   actions:
  #     run: .claude/validators/check-secrets.sh

  # ============================================================
  # PERMISSION HOOKS
  # ============================================================

  # Auto-approve read operations
  # - name: auto-approve-read
  #   description: Auto-approve read-only operations
  #   matchers:
  #     operations: [PermissionRequest]
  #     tools: [Read, Glob, Grep]
  #   actions:
  #     inject_inline: "Auto-approved: read-only operation"

  # ============================================================
  # AGENT LIFECYCLE HOOKS
  # ============================================================

  # Inject policy before agent/subagent tasks
  # Works on Claude Code (SubagentStart alias) and Gemini CLI (BeforeAgent)
  # - name: agent-policy
  #   description: Ensure agents follow project conventions
  #   matchers:
  #     operations: [BeforeAgent]
  #   actions:
